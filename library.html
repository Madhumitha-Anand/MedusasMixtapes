<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Songs — MEDUSA'S MIXTAPES</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page-header { text-align: center; padding: 40px 20px 16px; }
    .page-header p { margin-top: 8px; font-size: 1rem; color: var(--tape-brown); font-style: italic; opacity: 0.8; }

    .library-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 28px;
      padding: 0 20px 60px;
      max-width: 960px;
      margin: 0 auto;
    }
    @media (max-width: 720px) { .library-layout { grid-template-columns: 1fr; } }

    .section-title {
      font-family: 'Bangers', cursive;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--black);
      text-shadow: 2px 2px 0 var(--red);
      margin-bottom: 14px;
    }

    #results-list { max-height: 600px; overflow-y: auto; padding-right: 4px; }

    .basket-panel { position: sticky; top: 80px; align-self: start; }
    .basket-card {
      background: var(--yellow);
      border: 3px solid var(--black);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-lg);
      /* aged paper lines */
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 23px,
        rgba(0,0,0,0.06) 23px, rgba(0,0,0,0.06) 24px
      );
    }
    .basket-card h3 { color: var(--black); text-shadow: 1px 1px 0 rgba(0,0,0,0.15); -webkit-text-stroke: 0px; margin-bottom: 12px; }

    #basket-list { list-style: none; max-height: 280px; overflow-y: auto; margin-bottom: 14px; }
    #basket-list li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1.5px dashed rgba(0,0,0,0.2);
      font-size: 0.84rem; font-style: italic;
    }
    #basket-list li:last-child { border-bottom: none; }
    .remove-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 2px 6px; border-radius: 50%; transition: background 0.2s; }
    .remove-btn:hover { background: rgba(0,0,0,0.1); }
    .basket-song-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
    .basket-count { font-family: 'Bangers', cursive; font-size: 1rem; letter-spacing: 1px; margin-bottom: 6px; display: block; }

    .song-item.added { opacity: 0.6; background: #f5edd0; }
    .song-item.added .add-btn { background: #ccc; cursor: default; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">MEDUSA'S <span>MIXTAPES</span></a>
  <ul class="nav-links">
    <li><a href="library.html">Search</a></li>
    <li><a href="create.html">Create</a></li>
  </ul>
</nav>

<header class="page-header">
  <h2>Search the Crates</h2>
  <p>Find songs and add them to your mixtape basket</p>
</header>

<div class="container" style="padding-top:0;">
  <div class="search-row">
    <input type="text" id="search-input" class="input-field" placeholder="Search for a song or artist..." autocomplete="off"/>
    <button class="btn btn-red" id="search-btn" onclick="handleSearch()">Search</button>
  </div>

  <div class="library-layout">
    <div class="results-panel">
      <p class="section-title">Results</p>
      <div id="search-status" class="empty-state">Type something and hit Search to find songs</div>
      <div id="results-list"></div>
    </div>

    <div class="basket-panel">
      <div class="basket-card">
        <h3>Your Basket</h3>
        <span class="basket-count" id="basket-count">0 songs added</span>
        <ul id="basket-list"></ul>
        <div id="basket-empty" class="empty-state" style="font-size:0.85rem; padding:14px 0;">No songs yet — add some above</div>
        <hr class="divider"/>
        <button class="btn btn-black" style="width:100%; margin-bottom:10px;" onclick="clearBasket()">Clear All</button>
        <a href="create.html" class="btn btn-red" style="width:100%; display:block; text-align:center;">Build My Tape →</a>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script src="spotify.js"></script>
<script>
  let basket = JSON.parse(localStorage.getItem('mixtape_basket') || '[]');
  renderBasket();

  document.getElementById('search-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSearch();
  });

  async function handleSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;
    const statusEl = document.getElementById('search-status');
    const resultsList = document.getElementById('results-list');
    statusEl.innerHTML = '<span class="spinner"></span> Searching...';
    statusEl.style.display = 'block';
    resultsList.innerHTML = '';
    try {
      const tracks = await searchSpotify(query);
      if (tracks.length === 0) { statusEl.textContent = 'No results found. Try a different search.'; return; }
      statusEl.style.display = 'none';
      tracks.forEach(track => renderSongCard(track, resultsList));
    } catch (err) {
      statusEl.innerHTML = `Error: ${err.message}`;
      console.error(err);
    }
  }

  function renderSongCard(track, container) {
    const alreadyAdded = basket.some(s => s.id === track.id);
    const div = document.createElement('div');
    div.className = `song-item ${alreadyAdded ? 'added' : ''}`;
    div.id = `track-${track.id}`;
    div.innerHTML = `
      <img src="${track.image || ''}" alt="${track.album}" onerror="this.style.display='none'"/>
      <div class="song-info">
        <div class="song-name">${track.name}</div>
        <div class="song-artist">${track.artist} · ${formatDuration(track.duration_ms)}</div>
      </div>
      <button class="btn btn-red btn-sm add-btn" onclick="addToBasket('${track.id}')" ${alreadyAdded ? 'disabled' : ''}>
        ${alreadyAdded ? '✓ Added' : '+ Add'}
      </button>`;
    div._trackData = track;
    container.appendChild(div);
  }

  function addToBasket(trackId) {
    const el = document.getElementById(`track-${trackId}`);
    if (!el) return;
    const track = el._trackData;
    if (!track) return;
    if (basket.some(s => s.id === trackId)) { showToast('Already in your basket!'); return; }
    basket.push(track);
    localStorage.setItem('mixtape_basket', JSON.stringify(basket));
    el.classList.add('added');
    const btn = el.querySelector('.add-btn');
    btn.textContent = '✓ Added'; btn.disabled = true;
    renderBasket();
    showToast(`"${track.name}" added!`);
  }

  function renderBasket() {
    const list = document.getElementById('basket-list');
    const countEl = document.getElementById('basket-count');
    const emptyEl = document.getElementById('basket-empty');
    countEl.textContent = `${basket.length} song${basket.length !== 1 ? 's' : ''} added`;
    emptyEl.style.display = basket.length === 0 ? 'block' : 'none';
    list.innerHTML = '';
    basket.forEach(song => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="basket-song-name" title="${song.name}">${song.name}</span>
        <button class="remove-btn" onclick="removeFromBasket('${song.id}')">✕</button>`;
      list.appendChild(li);
    });
  }

  function removeFromBasket(trackId) {
    basket = basket.filter(s => s.id !== trackId);
    localStorage.setItem('mixtape_basket', JSON.stringify(basket));
    const el = document.getElementById(`track-${trackId}`);
    if (el) { el.classList.remove('added'); const btn = el.querySelector('.add-btn'); if (btn) { btn.textContent = '+ Add'; btn.disabled = false; } }
    renderBasket();
    showToast('Song removed');
  }

  function clearBasket() {
    if (basket.length === 0) return;
    if (!confirm('Clear all songs from your basket?')) return;
    basket = [];
    localStorage.setItem('mixtape_basket', JSON.stringify(basket));
    document.querySelectorAll('.song-item.added').forEach(el => {
      el.classList.remove('added');
      const btn = el.querySelector('.add-btn');
      if (btn) { btn.textContent = '+ Add'; btn.disabled = false; }
    });
    renderBasket();
    showToast('Basket cleared!');
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
