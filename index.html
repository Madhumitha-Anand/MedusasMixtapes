<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MEDUSA'S MIXTAPES</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .hero {
      min-height: 86vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      border: 60px solid rgba(200,16,46,0.06);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .hero > * { position: relative; z-index: 1; }

    .hero-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(3.8rem, 13vw, 7.5rem);
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--red);
      -webkit-text-stroke: 2px var(--black);
      text-shadow: 5px 5px 0 var(--black);
      margin-bottom: 36px;
      animation: titleDrop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both;
    }
    @keyframes titleDrop {
      from { opacity: 0; transform: translateY(-40px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

    .cassette-hero {
      margin: 0 auto 24px;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(4px 6px 0px rgba(26,16,8,0.4));
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-1.5deg); }
      50%      { transform: translateY(-18px) rotate(1.5deg); }
    }

    .footer-strip {
      background: var(--tape-brown);
      color: var(--cream);
      text-align: center;
      padding: 20px;
      font-size: 0.88rem;
      font-style: italic;
      border-top: 4px solid var(--red);
    }
    .footer-strip a { color: var(--yellow); text-decoration: none; }
  </style>
</head>
